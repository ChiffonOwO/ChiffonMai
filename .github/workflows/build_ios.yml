name: Build iOS IPA

on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这类 tag 时自动触发

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest  # GitHub 的 macOS 云环境

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'  # 改成你用的 Flutter 版本
          channel: 'stable'

      - name: 安装依赖
        run: |
          flutter pub get
          cd ios && pod install && cd ..

      # ---- 导入签名证书 ----
      - name: 导入证书和 Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 创建临时 keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          # 设置 keychain 超时时间（避免构建过程中被锁）
          security set-keychain-settings -lut 21600 build.keychain

          # 导入 p12 证书
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # 导入 Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision

      # ---- 构建 IPA ----
      - name: 构建 iOS IPA
        run: |
          flutter build ipa \
            --release \
            --export-method=app-store \
            --build-name=1.11.0 \
            --build-number=${{ github.run_number }}

      # ---- 上传 IPA ----
      - name: 上传 IPA 为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: build/ios/ipa/*.ipa

      # (可选) 自动上传到 App Store Connect
      # - name: 上传到 TestFlight
      #   run: |
      #     xcrun altool --upload-app \
      #       --type ios \
      #       --file build/ios/ipa/*.ipa \
      #       --username "${{ secrets.APP_STORE_CONNECT_EMAIL }}" \
      #       --password "${{ secrets.APP_STORE_CONNECT_PASSWORD }}"
